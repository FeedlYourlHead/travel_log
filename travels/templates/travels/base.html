<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TravelLog - Журнал путешествий</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a href="{% url 'travels:home' %}" class="navbar-brand">TravelLog</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          {% if user.is_authenticated %}
          <li class="nav-item"><a class="nav-link" href="{% url 'travels:dashboard' %}">Мои поездки</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'travels:create_note' %}">Добавить поездку</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'travels:logout' %}">Выйти ({{ user.username }})</a>
          </li>
          {% else %}
          <li class="nav-item"><a class="nav-link" href="{% url 'travels:login' %}">Войти</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'travels:register' %}">Регистрация</a></li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
