{% extends 'travels/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header bg-danger text-white">
        <h3 class="mb-0">Удаление записи</h3>
      </div>
      <div class="card-body">
        <p class="lead">Вы уверены, что хотите удалить запись "{{ note.place_name }}"?</p>
        <p>Это действие невозможно отменить.</p>

        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Да, удалить</button>
          <a href="{% url 'travels:detail' note.id %}" class="btn btn-secondary">Отмена</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
